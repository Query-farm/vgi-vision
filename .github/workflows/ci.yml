name: CI

on:
  push:
    branches: [main]
    paths-ignore: ['README.md']
  pull_request:
    branches: [main]
    paths-ignore: ['README.md']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest -q

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Check linting
        run: uv run ruff check .

      - name: Type check (mypy)
        run: uv run mypy vgi_vision/ vision_worker.py

      - name: Docstring lint (pydoclint)
        run: uvx pydoclint --config pyproject.toml vgi_vision/ vision_worker.py

  # Resolve the latest published haybarn release once, so the whole matrix tests
  # the same version (and we never hardcode/pin it).
  resolve-haybarn:
    name: Resolve haybarn release
    runs-on: ubuntu-latest
    outputs:
      release: ${{ steps.r.outputs.release }}
    steps:
      - id: r
        run: |
          REL=$(gh release view --repo Query-farm-haybarn/haybarn --json tagName --jq .tagName)
          echo "release=$REL" >> "$GITHUB_OUTPUT"
          echo "Latest haybarn release: $REL"
        env:
          GH_TOKEN: ${{ github.token }}

  integration:
    name: SQL E2E (${{ matrix.transport }}) on ${{ matrix.os }}
    needs: resolve-haybarn
    strategy:
      fail-fast: false
      matrix:
        # Run the SAME sqllogictest suite over every VGI transport. The vgi
        # extension picks the transport from the ATTACH LOCATION string that
        # run-integration.sh builds per $TRANSPORT:
        #   subprocess : `uv run vision_worker.py`   (stdio; extension spawns it)
        #   http       : `http://127.0.0.1:<port>`   (worker booted with --http)
        #   unix       : `unix:///tmp/vision.sock`    (worker booted with --unix)
        os: [ubuntu-latest, macos-latest]
        transport: [subprocess, http, unix]
        include:
          - { os: ubuntu-latest, asset: haybarn_unittest-linux-amd64.zip }
          - { os: macos-latest,  asset: haybarn_unittest-osx-arm64.zip }
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install the worker (from the lockfile, with the http extra)
        # The `http` extra pulls in waitress so the worker can serve `--http`.
        # Harmless for the subprocess/unix legs; required for the http leg.
        run: uv sync --frozen --python 3.13 --extra http

      - name: Download haybarn-unittest
        run: |
          gh release download "$HAYBARN_RELEASE" \
            --repo Query-farm-haybarn/haybarn \
            --pattern '${{ matrix.asset }}' \
            --output haybarn-unittest.zip --clobber
          mkdir -p hb && unzip -o -q haybarn-unittest.zip -d hb
        env:
          GH_TOKEN: ${{ github.token }}
          HAYBARN_RELEASE: ${{ needs.resolve-haybarn.outputs.release }}

      - name: Resolve runner + worker paths
        run: |
          # Absolute paths: run-integration.sh cd's into a staging dir before
          # invoking the runner, so relative paths would not resolve. WORKER_CMD
          # is used directly as the stdio LOCATION for subprocess, and as the
          # process the harness boots for --http / --unix; the new
          # run-integration.sh derives VGI_VISION_WORKER itself per $TRANSPORT.
          UNITTEST="$PWD/$(find hb -name 'haybarn-unittest' -type f | head -1)"
          chmod +x "$UNITTEST"
          echo "HAYBARN_UNITTEST=$UNITTEST" >> "$GITHUB_ENV"
          # Use the project venv python (populated by `uv sync --frozen --extra http`
          # above) via an ABSOLUTE path — run-integration.sh cd's into a staging dir, so
          # a relative `.venv/bin/python` would not resolve. This pins the worker to the
          # frozen lockfile rather than a separate `uv run` PEP-723 resolution.
          echo "WORKER_CMD=$PWD/.venv/bin/python $PWD/vision_worker.py" >> "$GITHUB_ENV"

      - name: Run extension integration suite (${{ matrix.transport }})
        run: ci/run-integration.sh
        env:
          TRANSPORT: ${{ matrix.transport }}

  # Catalog/function metadata quality gate. Builds the worker (same as the
  # integration job) and runs the signed vgi-lint metadata linter, failing on
  # any finding at info severity or above.
  metadata-quality:
    name: Metadata quality (vgi-lint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Install the worker (from the lockfile, with the http extra)
        run: uv sync --frozen --python 3.13 --extra http

      - name: vgi-lint
        uses: Query-farm/vgi-lint-check@v1
        with:
          version: "0.73.0"
          # Run the worker through the project venv python (populated by `uv sync
          # --frozen` above), not `uv run <script>`: the PEP-723 script env is a
          # separate resolution that can cache a stale SDK and emit the old catalog
          # schema, producing a false schema-mismatch at ATTACH.
          location: ".venv/bin/python vision_worker.py"
          fail-on: info
